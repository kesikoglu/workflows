name: Music Video Render & YouTube Upload

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Session ID'
        required: true
      audio_urls:
        description: 'JSON array of audio URLs'
        required: true
      cover_image_url:
        description: 'Cover image URL'
        required: true
      video_title:
        description: 'YouTube video title'
        required: true
      youtube_description:
        description: 'YouTube description'
        required: true
      youtube_tags:
        description: 'Comma-separated tags'
        required: true

jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg python3-pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Download all audio files
        run: |
         mkdir -p audio_files
         python3 << 'EOF'
         import json, requests

         urls = json.loads('${{ inputs.audio_urls }}')
         headers = {"User-Agent": "Mozilla/5.0 (compatible; MusicPipeline/1.0)"}
         print(f"Downloading {len(urls)} audio files...")
         for i, url in enumerate(urls):
            dest = f"audio_files/track_{i:04d}.mp3"
            r = requests.get(url, headers=headers, stream=True, timeout=120)
            r.raise_for_status()
            with open(dest, "wb") as f:
                for chunk in r.iter_content(chunk_size=8192):
                    f.write(chunk)
            print(f" [{i+1}/{len(urls)}] {dest}")
         EOF

      - name: Download cover image
        run: |
          python3 -c "
          import urllib.request
          urllib.request.urlretrieve('${{ inputs.cover_image_url }}', 'cover_raw.jpg')
          print('Cover downloaded.')
          "

      - name: Prepare cover 1920x1080
        run: |
          ffmpeg -i cover_raw.jpg \
            -vf "scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2:color=black,setsar=1" \
            cover_hd.jpg

      - name: Build FFmpeg concat list
        run: |
          ls audio_files/track_*.mp3 | sort | while read f; do
            echo "file '../$f'"
          done > concat_list.txt
          cat concat_list.txt

      - name: Concatenate all audio
        run: |
          ffmpeg -f concat -safe 0 -i concat_list.txt -c copy merged_audio.mp3
          DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 merged_audio.mp3)
          echo "Total duration: ${DURATION}s"
          echo "AUDIO_DURATION=${DURATION}" >> $GITHUB_ENV

      - name: Render video
        run: |
          ffmpeg \
            -loop 1 -framerate 1 -i cover_hd.jpg \
            -i merged_audio.mp3 \
            -c:v libx264 -tune stillimage -preset slow \
            -c:a aac -b:a 192k \
            -pix_fmt yuv420p \
            -t "${{ env.AUDIO_DURATION }}" \
            -movflags +faststart \
            output.mp4
          ls -lh output.mp4

      - name: Upload to YouTube
        env:
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, json, requests

          r = requests.post("https://oauth2.googleapis.com/token", data={
            "client_id":     os.environ["YT_CLIENT_ID"],
            "client_secret": os.environ["YT_CLIENT_SECRET"],
            "refresh_token": os.environ["YT_REFRESH_TOKEN"],
            "grant_type":    "refresh_token"
          })
          access_token = r.json()["access_token"]

          meta = {
            "snippet": {
              "title":       "${{ inputs.video_title }}",
              "description": "${{ inputs.youtube_description }}",
              "tags":        [t.strip() for t in "${{ inputs.youtube_tags }}".split(",")],
              "categoryId":  "10"
            },
            "status": { "privacyStatus": "public" }
          }

          init = requests.post(
            "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status",
            headers={
              "Authorization": f"Bearer {access_token}",
              "Content-Type":  "application/json; charset=UTF-8",
              "X-Upload-Content-Type": "video/mp4"
            },
            data=json.dumps(meta)
          )
          upload_url = init.headers["Location"]

          file_size  = os.path.getsize("output.mp4")
          chunk_size = 50 * 1024 * 1024
          uploaded   = 0

          with open("output.mp4", "rb") as f:
            while uploaded < file_size:
              chunk = f.read(chunk_size)
              end   = uploaded + len(chunk) - 1
              resp  = requests.put(
                upload_url,
                headers={
                  "Authorization": f"Bearer {access_token}",
                  "Content-Range": f"bytes {uploaded}-{end}/{file_size}",
                  "Content-Type":  "video/mp4"
                },
                data=chunk
              )
              uploaded += len(chunk)
              print(f"Uploaded {uploaded}/{file_size} ({100*uploaded//file_size}%)")

          video_id = resp.json().get("id", "unknown")
          print(f"Done! https://youtube.com/watch?v={video_id}")
          EOF

name: Music Video Render & YouTube Upload

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Session ID'
        required: true
      audio_urls:
        description: 'JSON array of audio URLs'
        required: true
      cover_image_url:
        description: 'Cover image URL'
        required: true
      video_title:
        description: 'YouTube video title'
        required: true
      youtube_description:
        description: 'YouTube description'
        required: true
      youtube_tags:
        description: 'Comma-separated tags'
        required: true
      shorts_cover_url:
        description: 'shorts.jpg Drive URL (optional, empty = Gemini ile portrait üret)'
        required: false
        default: ''
      shorts_image_prompt:
        description: 'Gemini için shorts görsel prompt (n8n den gelir)'
        required: false
        default: ''

jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg python3-pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests numpy

      - name: Download all audio files
        run: |
         mkdir -p audio_files
         python3 << 'EOF'
         import json, requests

         urls = json.loads('${{ inputs.audio_urls }}')
         headers = {"User-Agent": "Mozilla/5.0 (compatible; MusicPipeline/1.0)"}
         print(f"Downloading {len(urls)} audio files...")
         for i, url in enumerate(urls):
            dest = f"audio_files/track_{i:04d}.mp3"
            r = requests.get(url, headers=headers, stream=True, timeout=120)
            r.raise_for_status()
            with open(dest, "wb") as f:
                for chunk in r.iter_content(chunk_size=8192):
                    f.write(chunk)
            print(f" [{i+1}/{len(urls)}] {dest}")
         EOF

      - name: Download cover image
        run: |
          python3 -c "
          import urllib.request
          urllib.request.urlretrieve('${{ inputs.cover_image_url }}', 'cover_raw.jpg')
          print('Cover downloaded.')
          "

      - name: Prepare cover 1920x1080 (landscape)
        run: |
          ffmpeg -i cover_raw.jpg             -vf "scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,setsar=1"             cover_hd.jpg

      # ── Shorts kapak: manuel varsa onu kullan, yoksa Gemini ile 9:16 portrait üret ──
      - name: Prepare Shorts cover portrait 1080x1920
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHORTS_COVER_URL: ${{ inputs.shorts_cover_url }}
          SHORTS_IMAGE_PROMPT: ${{ inputs.shorts_image_prompt }}
        run: |
          python3 << 'EOF'
          import os, requests, base64, json

          shorts_url = os.environ.get("SHORTS_COVER_URL", "").strip()

          if shorts_url:
              print("Manuel shorts.jpg bulundu, indiriliyor...")
              r = requests.get(shorts_url, timeout=60)
              r.raise_for_status()
              with open("shorts_raw.jpg", "wb") as f:
                  f.write(r.content)
              print("shorts.jpg indirildi.")
              use_raw = "shorts_raw.jpg"
          else:
              print("shorts_cover_url bos, Gemini ile 9:16 portrait gorsel uretiliyor...")
              prompt = os.environ.get("SHORTS_IMAGE_PROMPT", "").strip()
              if not prompt:
                  prompt = "A vertical portrait 9:16 cinematic music album cover art, atmospheric, moody lighting, suitable for YouTube Shorts, high quality digital art"

              api_key = os.environ["GEMINI_API_KEY"]
              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key={api_key}"
              body = {
                  "contents": [{"parts": [{"text": prompt}]}],
                  "generationConfig": {
                      "responseModalities": ["image", "text"]
                  }
              }
              resp = requests.post(url, json=body, timeout=120)
              resp.raise_for_status()
              data = resp.json()
              # Base64 resmi çıkar
              img_b64 = None
              for part in data["candidates"][0]["content"]["parts"]:
                  if "inlineData" in part:
                      img_b64 = part["inlineData"]["data"]
                      break
              if not img_b64:
                  print("Gemini gorsel dondurmedi, cover_raw.jpg crop kullaniliyor...")
                  use_raw = "cover_raw.jpg"
              else:
                  with open("shorts_raw.jpg", "wb") as f:
                      f.write(base64.b64decode(img_b64))
                  print("Gemini 9:16 portrait gorsel uretildi.")
                  use_raw = "shorts_raw.jpg"

          import subprocess
          subprocess.run([
              "ffmpeg", "-i", use_raw,
              "-vf", "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1",
              "cover_portrait.jpg"
          ], check=True)
          print("cover_portrait.jpg hazir.")
          EOF

      - name: Build FFmpeg concat list
        run: |
          ls audio_files/track_*.mp3 | sort | while read f; do
            echo "file '$f'"
          done > concat_list.txt
          cat concat_list.txt

      - name: Concatenate all audio
        run: |
          ffmpeg -f concat -safe 0 -i concat_list.txt -c copy merged_audio.mp3
          DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 merged_audio.mp3)
          echo "Total duration: ${DURATION}s"
          echo "AUDIO_DURATION=${DURATION}" >> $GITHUB_ENV

      - name: Render video (landscape)
        run: |
          ffmpeg             -loop 1 -framerate 1 -i cover_hd.jpg             -i merged_audio.mp3             -c:v libx264 -tune stillimage -preset slow             -c:a aac -b:a 192k             -pix_fmt yuv420p             -t "${{ env.AUDIO_DURATION }}"             -movflags +faststart             output.mp4
          ls -lh output.mp4

      # ── Shorts: ses ritmi analiz et → pulse zoom efekti ──
      - name: Render Shorts video (portrait, 59s + beat pulse)
        run: |
          python3 << 'EOF'
          import subprocess, json, math, os

          # 1. İlk 59 saniyelik ses seviyesini analiz et (her 0.1s'de bir)
          result = subprocess.run([
              "ffprobe", "-v", "quiet",
              "-select_streams", "a:0",
              "-show_frames",
              "-read_intervals", "%+59",
              "-of", "json",
              "-f", "lavfi",
              "amovie=merged_audio.mp3,astats=metadata=1:reset=1",
          ], capture_output=True, text=True)

          # 2. Ses seviyesini ffmpeg volumedetect ile al (daha basit)
          vol_result = subprocess.run([
              "ffmpeg", "-i", "merged_audio.mp3",
              "-t", "59",
              "-af", "astats=metadata=1:reset=100ms,ametadata=print:key=lavfi.astats.Overall.RMS_level:file=/tmp/rms.txt",
              "-f", "null", "-"
          ], capture_output=True, text=True)

          # 3. RMS değerlerini oku ve normalize et
          rms_values = []
          try:
              with open("/tmp/rms.txt") as f:
                  for line in f:
                      line = line.strip()
                      if "=" in line:
                          val = line.split("=")[-1].strip()
                          try:
                              db = float(val)
                              if db > -100:
                                  rms_values.append(db)
                          except:
                              pass
          except:
              pass

          print(f"RMS sample sayisi: {len(rms_values)}")

          if len(rms_values) < 5:
              print("Yeterli RMS verisi yok, sabit zoom kullaniliyor...")
              # Fallback: basit Ken Burns zoom
              subprocess.run([
                  "ffmpeg",
                  "-loop", "1", "-framerate", "25", "-i", "cover_portrait.jpg",
                  "-i", "merged_audio.mp3",
                  "-filter_complex",
                  "[0:v]scale=1080:1920,zoompan=z='min(zoom+0.0005,1.05)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1475:s=1080x1920:fps=25[v]",
                  "-map", "[v]", "-map", "1:a",
                  "-c:v", "libx264", "-preset", "slow",
                  "-c:a", "aac", "-b:a", "192k",
                  "-pix_fmt", "yuv420p",
                  "-t", "59",
                  "-movflags", "+faststart",
                  "output_shorts.mp4"
              ], check=True)
          else:
              # 4. Normalize: -60dB → 1.0, 0dB → 1.08 (max zoom)
              min_db = max(min(rms_values), -60)
              max_db = max(rms_values)
              db_range = max(max_db - min_db, 1)

              # Her frame için zoom değeri üret (25fps, 59s = 1475 frame)
              fps = 25
              total_frames = 59 * fps
              samples_per_frame = len(rms_values) / total_frames

              zoom_expr_parts = []
              for i in range(total_frames):
                  rms_idx = min(int(i * samples_per_frame), len(rms_values) - 1)
                  db = rms_values[rms_idx]
                  # Normalize 1.0 - 1.08
                  norm = (db - min_db) / db_range
                  zoom = 1.0 + (norm * 0.08)
                  zoom = round(zoom, 4)
                  zoom_expr_parts.append(zoom)

              # FFmpeg zoompan için smooth expression oluştur
              # Uzun expression yerine ortalama + sin wave kullan (daha stabil)
              avg_zoom = sum(zoom_expr_parts) / len(zoom_expr_parts)
              amplitude = (max(zoom_expr_parts) - min(zoom_expr_parts)) / 2
              amplitude = min(amplitude, 0.05)  # Max %5 zoom değişim

              print(f"Zoom avg: {avg_zoom:.4f}, amplitude: {amplitude:.4f}")

              # zoompan: ritme göre sin wave pulse
              # n = frame numarası, fps=25, beat ~0.5-2Hz arası
              zoom_expr = f"'min(max({avg_zoom:.4f}+{amplitude:.4f}*sin(2*PI*n/{fps}*1.5),1.0),1.1)'"
              pan_x = "iw/2-(iw/zoom/2)"
              pan_y = "ih/2-(ih/zoom/2)"

              vf = f"[0:v]scale=2160:3840,zoompan=z={zoom_expr}:x='{pan_x}':y='{pan_y}':d=1:s=1080x1920:fps={fps},scale=1080:1920[v]"

              print("FFmpeg Shorts render basliyor (beat pulse)...")
              subprocess.run([
                  "ffmpeg",
                  "-loop", "1", "-framerate", str(fps), "-i", "cover_portrait.jpg",
                  "-i", "merged_audio.mp3",
                  "-filter_complex", vf,
                  "-map", "[v]", "-map", "1:a",
                  "-c:v", "libx264", "-preset", "slow",
                  "-c:a", "aac", "-b:a", "192k",
                  "-pix_fmt", "yuv420p",
                  "-t", "59",
                  "-movflags", "+faststart",
                  "output_shorts.mp4"
              ], check=True)

          size = os.path.getsize("output_shorts.mp4")
          print(f"output_shorts.mp4 hazir: {size/1024/1024:.1f} MB")
          EOF

      - name: Upload to YouTube (long form)
        id: youtube_upload
        env:
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_TITLE:         ${{ inputs.video_title }}
          YT_DESCRIPTION:   ${{ inputs.youtube_description }}
          YT_TAGS:          ${{ inputs.youtube_tags }}
        run: |
          python3 << 'EOF'
          import os, json, requests

          r = requests.post("https://oauth2.googleapis.com/token", data={
            "client_id":     os.environ["YT_CLIENT_ID"],
            "client_secret": os.environ["YT_CLIENT_SECRET"],
            "refresh_token": os.environ["YT_REFRESH_TOKEN"],
            "grant_type":    "refresh_token"
          })
          resp_data = r.json()
          print("OAuth response:", resp_data)
          access_token = resp_data["access_token"]

          meta = {
            "snippet": {
              "title":       os.environ["YT_TITLE"],
              "description": os.environ["YT_DESCRIPTION"],
              "tags":        [t.strip() for t in os.environ["YT_TAGS"].split(",")],
              "categoryId":  "10"
            },
            "status": { "privacyStatus": "public" }
          }

          init = requests.post(
            "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status",
            headers={
              "Authorization": f"Bearer {access_token}",
              "Content-Type":  "application/json; charset=UTF-8",
              "X-Upload-Content-Type": "video/mp4"
            },
            data=json.dumps(meta)
          )
          upload_url = init.headers["Location"]

          file_size  = os.path.getsize("output.mp4")
          chunk_size = 50 * 1024 * 1024
          uploaded   = 0

          with open("output.mp4", "rb") as f:
            while uploaded < file_size:
              chunk = f.read(chunk_size)
              end   = uploaded + len(chunk) - 1
              resp  = requests.put(
                upload_url,
                headers={
                  "Authorization": f"Bearer {access_token}",
                  "Content-Range": f"bytes {uploaded}-{end}/{file_size}",
                  "Content-Type":  "video/mp4"
                },
                data=chunk
              )
              uploaded += len(chunk)
              print(f"Uploaded {uploaded}/{file_size} ({100*uploaded//file_size}%)")

          video_id = resp.json().get("id", "unknown")
          print(f"Done! https://youtube.com/watch?v={video_id}")

          gh_output = os.environ.get("GITHUB_OUTPUT", "")
          if gh_output:
              with open(gh_output, "a") as fh:
                  fh.write(f"video_id={video_id}\n")
          EOF

      - name: Upload to YouTube (Shorts)
        id: shorts_upload
        env:
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_TITLE:         ${{ inputs.video_title }}
          YT_TAGS:          ${{ inputs.youtube_tags }}
          MAIN_VIDEO_ID:    ${{ steps.youtube_upload.outputs.video_id }}
        run: |
          python3 << 'EOF'
          import os, json, requests

          r = requests.post("https://oauth2.googleapis.com/token", data={
            "client_id":     os.environ["YT_CLIENT_ID"],
            "client_secret": os.environ["YT_CLIENT_SECRET"],
            "refresh_token": os.environ["YT_REFRESH_TOKEN"],
            "grant_type":    "refresh_token"
          })
          access_token = r.json()["access_token"]

          base_title   = os.environ["YT_TITLE"]
          main_video_id = os.environ.get("MAIN_VIDEO_ID", "")

          # Shorts baslik: maks 70 karakter + #Shorts
          short_title = base_title[:70] + " #Shorts"

          # Aciklama: ana videoya link
          full_video_line = (
              f"\n\n\U0001f3ac Full version: https://youtube.com/watch?v={main_video_id}"
              if main_video_id and main_video_id != "unknown" else ""
          )
          short_desc = (
              f"\U0001f3b5 {base_title}\n\n"
              "Relax, focus, and let the music flow. \u2728"
              f"{full_video_line}\n\n"
              "#Shorts #RelaxingMusic #ChillVibes #LoFi #AmbientMusic"
          )

          tags = [t.strip() for t in os.environ["YT_TAGS"].split(",")]
          tags = list(dict.fromkeys(tags + ["Shorts", "YouTube Shorts", "Relaxing Music Short"]))

          meta = {
            "snippet": {
              "title":       short_title,
              "description": short_desc,
              "tags":        tags,
              "categoryId":  "10"
            },
            "status": { "privacyStatus": "public" }
          }

          init = requests.post(
            "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status",
            headers={
              "Authorization": f"Bearer {access_token}",
              "Content-Type":  "application/json; charset=UTF-8",
              "X-Upload-Content-Type": "video/mp4"
            },
            data=json.dumps(meta)
          )
          upload_url = init.headers["Location"]

          file_size  = os.path.getsize("output_shorts.mp4")
          chunk_size = 50 * 1024 * 1024
          uploaded   = 0

          with open("output_shorts.mp4", "rb") as f:
            while uploaded < file_size:
              chunk = f.read(chunk_size)
              end   = uploaded + len(chunk) - 1
              resp  = requests.put(
                upload_url,
                headers={
                  "Authorization": f"Bearer {access_token}",
                  "Content-Range": f"bytes {uploaded}-{end}/{file_size}",
                  "Content-Type":  "video/mp4"
                },
                data=chunk
              )
              uploaded += len(chunk)
              print(f"Shorts {uploaded}/{file_size} ({100*uploaded//file_size}%)")

          shorts_id = resp.json().get("id", "unknown")
          print(f"Shorts done! https://youtube.com/shorts/{shorts_id}")

          gh_output = os.environ.get("GITHUB_OUTPUT", "")
          if gh_output:
              with open(gh_output, "a") as fh:
                  fh.write(f"shorts_id={shorts_id}\n")
          EOF

      - name: Notify n8n — YouTube Complete
        if: always()
        run: |
          VIDEO_ID="${{ steps.youtube_upload.outputs.video_id }}"
          SHORTS_ID="${{ steps.shorts_upload.outputs.shorts_id }}"
          echo "VIDEO_ID: $VIDEO_ID"
          echo "SHORTS_ID: $SHORTS_ID"
          if [ -n "$VIDEO_ID" ] && [ "$VIDEO_ID" != "unknown" ]; then
            curl -s -X POST "https://n8n-production-eefc3.up.railway.app/webhook/614ee79d-c73c-4b3d-87da-44f1abd76f4a" \
              -H "Content-Type: application/json" \
              -d "{\"session_id\": \"${{ inputs.session_id }}\", \"youtube_id\": \"$VIDEO_ID\", \"shorts_id\": \"$SHORTS_ID\"}"
            echo "n8n callback gonderildi."
          else
            echo "VIDEO_ID bulunamadi, callback atlandi."
          fi
